<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Notifications — Portail Étudiant ONIFRA</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    :root {
      --navy:     #08122d;
      --navy-mid: #0d1f3c;
      --accent:   #c8a951;
      --accent-lt:#e4c96a;
      --muted:    rgba(255,255,255,0.5);
      --radius:   14px;
      --bg:       #f0f4f8;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* ══════════════════════
       HEADER
    ══════════════════════ */
    .top-header {
      background: var(--navy);
      padding: 1rem 1.25rem .85rem;
      position: sticky; top: 0; z-index: 100;
      border-bottom: 1px solid rgba(200,169,81,.15);
    }
    .header-inner {
      max-width: 680px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    }
    .header-left { display: flex; align-items: center; gap: .75rem; min-width: 0; }
    .avatar {
      width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent-lt));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: .95rem; font-weight: 700; color: var(--navy);
    }
    .header-text { min-width: 0; }
    .header-greeting { font-size: .72rem; color: var(--muted); }
    .header-name {
      font-family: 'Playfair Display', serif;
      font-size: 1rem; font-weight: 700; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .header-badge {
      display: inline-flex; align-items: center;
      background: rgba(200,169,81,.15);
      border: 1px solid rgba(200,169,81,.3);
      border-radius: 20px; padding: 2px 10px;
      font-size: .68rem; font-weight: 600;
      letter-spacing: .06em; text-transform: uppercase;
      color: var(--accent); margin-top: 3px;
    }
    .btn-logout {
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px; color: var(--muted);
      padding: .5rem .75rem; cursor: pointer;
      font-size: .78rem; font-weight: 500;
      display: flex; align-items: center; gap: 5px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s, color .15s;
      white-space: nowrap; flex-shrink: 0;
    }
    .btn-logout:hover { background: rgba(224,92,92,.15); color: #e05c5c; border-color: rgba(224,92,92,.3); }

    /* ══════════════════════
       CONTENU
    ══════════════════════ */
    .main { max-width: 680px; margin: 0 auto; padding: 1.5rem 1.25rem; }

    /* ── Barre titre + tout lire ── */
    .page-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 1rem; margin-bottom: 1.25rem;
      animation: fadeUp .3s ease both;
    }
    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem; font-weight: 700; color: var(--navy-mid);
    }
    .page-sub { font-size: .82rem; color: #6b7a99; margin-top: .2rem; }
    .btn-read-all {
      background: none; border: 1px solid rgba(13,31,60,.12);
      border-radius: 8px; color: #6b7a99;
      padding: .4rem .85rem; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: .75rem; font-weight: 500;
      white-space: nowrap; flex-shrink: 0;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
      transition: all .15s; margin-top: .25rem;
    }
    .btn-read-all:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Groupes par date ── */
    .notif-group { margin-bottom: 1.5rem; }
    .notif-group-label {
      font-size: .68rem; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase;
      color: #8a9ab5; margin-bottom: .6rem; display: block;
    }

    /* ── Item notification ── */
    .notif-item {
      background: #fff;
      border-radius: var(--radius);
      border: 1px solid rgba(13,31,60,.07);
      box-shadow: 0 2px 8px rgba(13,31,60,.04);
      display: flex; align-items: flex-start; gap: .85rem;
      padding: .9rem 1rem;
      margin-bottom: .5rem;
      cursor: pointer;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
      transition: background .15s, box-shadow .2s, transform .15s;
      animation: fadeUp .4s ease both;
      position: relative;
    }
    .notif-item:hover  { box-shadow: 0 4px 16px rgba(13,31,60,.1); transform: translateX(3px); }
    .notif-item:active { transform: scale(.99); }
    .notif-item.unread { background: #fffdf4; border-color: rgba(200,169,81,.25); }
    .notif-item.unread::before {
      content: ''; position: absolute;
      left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--accent); border-radius: var(--radius) 0 0 var(--radius);
    }

    /* Icône type */
    .notif-icon {
      width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0; margin-top: 1px;
    }
    .notif-icon.edt      { background: rgba(34,197,94,.12);  color: #16a34a; }
    .notif-icon.annonce  { background: rgba(200,169,81,.15); color: #a07d20; }
    .notif-icon.admin    { background: rgba(59,130,246,.12); color: #2563eb; }
    .notif-icon.urgent   { background: rgba(224,92,92,.12);  color: #c0392b; }
    .notif-icon.cours    { background: rgba(139,92,246,.12); color: #7c3aed; }

    .notif-content { flex: 1; min-width: 0; }
    .notif-title {
      font-size: .88rem; font-weight: 600;
      color: #0d1f3c; line-height: 1.35; margin-bottom: .25rem;
    }
    .notif-item.unread .notif-title { font-weight: 700; }
    .notif-message {
      font-size: .78rem; color: #6b7a99; line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .notif-time {
      font-size: .68rem; color: #a0aec0;
      margin-top: .35rem; display: flex; align-items: center; gap: 4px;
    }

    .notif-unread-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent); flex-shrink: 0; margin-top: 6px;
    }
    .notif-item:not(.unread) .notif-unread-dot { opacity: 0; }

    /* ── État vide ── */
    .state-box {
      text-align: center; padding: 3.5rem 1rem; color: #8a9ab5;
    }
    .state-box i { font-size: 2.8rem; display: block; margin-bottom: .85rem; opacity: .25; }
    .state-box strong { display: block; font-size: .95rem; color: #4a5568; margin-bottom: .4rem; }
    .state-box p { font-size: .82rem; line-height: 1.6; }

    /* Skeleton */
    .skel-notif {
      background: #fff; border-radius: var(--radius);
      padding: .9rem 1rem; margin-bottom: .5rem;
      display: flex; align-items: center; gap: .85rem;
      border: 1px solid rgba(13,31,60,.06);
    }
    .skel-icon-sq { width:38px; height:38px; border-radius:10px; flex-shrink:0; }
    .skel-body { flex:1; display:flex; flex-direction:column; gap:.4rem; }
    .skel { border-radius:6px; background:linear-gradient(90deg,#eef0f5 25%,#e2e6ed 50%,#eef0f5 75%); background-size:800px 100%; animation:shimmer 1.4s ease-in-out infinite; }
    .skel-line { height:10px; }
    .skel-line.w70 { width:70%; }
    .skel-line.w45 { width:45%; }
    @keyframes shimmer { 0%{background-position:-400px 0} 100%{background-position:400px 0} }

    /* ══════════════════════
       BOTTOM NAV
    ══════════════════════ */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--navy);
      border-top: 1px solid rgba(200,169,81,.15);
      display: flex; z-index: 100;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: .75rem .5rem; gap: 3px;
      text-decoration: none; color: var(--muted);
      font-size: .72rem; font-weight: 500;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
      transition: color .15s; position: relative;
    }
    .nav-item i { font-size: 1.1rem; }
    .nav-item.active { color: var(--accent); }
    .nav-item.active::after {
      content: ''; position: absolute;
      top: 0; left: 25%; right: 25%; height: 2px;
      background: var(--accent); border-radius: 0 0 2px 2px;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="top-header">
    <div class="header-inner">
      <div class="header-left">
        <div class="avatar" id="avatar">?</div>
        <div class="header-text">
          <div class="header-greeting">Bonjour,</div>
          <div class="header-name" id="headerName">—</div>
          <div class="header-badge" id="headerBadge">—</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">
        <i class="bi bi-box-arrow-right"></i> Déconnexion
      </button>
    </div>
  </header>

  <!-- CONTENU -->
  <main class="main">

    <div class="page-header">
      <div>
        <div class="page-title">Notifications</div>
        <div class="page-sub" id="pageSub">Chargement…</div>
      </div>
      <button class="btn-read-all" id="btnReadAll" onclick="markAllRead()" style="display:none;">
        Tout lire
      </button>
    </div>

    <div id="notifContainer">
      <!-- Skeletons -->
      <div class="skel-notif"><div class="skel skel-icon-sq"></div><div class="skel-body"><div class="skel skel-line w70"></div><div class="skel skel-line w45"></div></div></div>
      <div class="skel-notif"><div class="skel skel-icon-sq"></div><div class="skel-body"><div class="skel skel-line w70"></div><div class="skel skel-line w45"></div></div></div>
      <div class="skel-notif"><div class="skel skel-icon-sq"></div><div class="skel-body"><div class="skel skel-line w70"></div><div class="skel skel-line w45"></div></div></div>
      <div class="skel-notif"><div class="skel skel-icon-sq"></div><div class="skel-body"><div class="skel skel-line w70"></div><div class="skel skel-line w45"></div></div></div>
    </div>

  </main>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a href="page-principale.html" class="nav-item">
      <i class="bi bi-house-fill"></i>Accueil
    </a>
    <a href="cours.html" class="nav-item">
      <i class="bi bi-journal-bookmark"></i>Cours
    </a>
    <a href="edt.html" class="nav-item">
      <i class="bi bi-calendar-week"></i>EDT
    </a>
    <a href="annonces.html" class="nav-item">
      <i class="bi bi-megaphone"></i>Annonces
    </a>
    <a href="notifications.html" class="nav-item active">
      <i class="bi bi-bell-fill"></i>Notifs
    </a>
  </nav>

  <script>
    /* ── Auth guard ── */
    (function () {
      const t = sessionStorage.getItem('onifra_token');
      if (!t) { location.href = 'login.html'; return; }
      try {
        const p = JSON.parse(atob(t.split('.')[1]));
        if (p.exp * 1000 < Date.now()) { sessionStorage.clear(); location.href = 'login.html'; }
      } catch { sessionStorage.clear(); location.href = 'login.html'; }
    })();

    /* ── Étudiant ── */
    const etudiant = JSON.parse(sessionStorage.getItem('onifra_etudiant') || '{}');
    const { nom = '', prenom = '', mention = '', niveau = '' } = etudiant;
    const mentionLabel = { gestion: 'Gestion', droit: 'Droit', agronomie: 'Agronomie' };

    document.getElementById('avatar').textContent =
      ((prenom[0] || '') + (nom[0] || '')).toUpperCase() || '?';
    document.getElementById('headerName').textContent  = prenom + ' ' + nom.toUpperCase();
    document.getElementById('headerBadge').textContent =
      (mentionLabel[mention] || mention) + ' · ' + niveau;

    /* ── API ── */
    const API   = '/api';
    const token = sessionStorage.getItem('onifra_token');
    const hdrs  = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };

    let allNotifs = [];

    /* ── Icônes par type ── */
    const ICONS = {
      edt:     { icon: 'bi-calendar-week-fill', cls: 'edt'     },
      annonce: { icon: 'bi-megaphone-fill',      cls: 'annonce' },
      admin:   { icon: 'bi-shield-fill',         cls: 'admin'   },
      urgent:  { icon: 'bi-exclamation-triangle-fill', cls: 'urgent' },
      cours:   { icon: 'bi-journal-bookmark-fill', cls: 'cours' },
    };

    /* ── Charger notifications ── */
    async function loadNotifs() {
      try {
        const res  = await fetch(`${API}/notifications`, { headers: hdrs });
        allNotifs  = await res.json();
        render(allNotifs);
      } catch {
        document.getElementById('notifContainer').innerHTML = `
          <div class="state-box">
            <i class="bi bi-wifi-off"></i>
            <strong>Connexion impossible</strong>
            <p>Impossible de charger les notifications.<br>Vérifiez votre connexion.</p>
          </div>`;
      }
    }

    /* ── Rendu groupé par date ── */
    function render(notifs) {
      const container = document.getElementById('notifContainer');
      const pageSub   = document.getElementById('pageSub');
      const btnAll    = document.getElementById('btnReadAll');

      if (!notifs.length) {
        pageSub.textContent = 'Aucune notification';
        container.innerHTML = `
          <div class="state-box">
            <i class="bi bi-bell-slash"></i>
            <strong>Tout est à jour !</strong>
            <p>Vous n'avez aucune notification pour le moment.</p>
          </div>`;
        return;
      }

      const unreadCount = notifs.filter(n => !n.lu).length;
      pageSub.textContent = unreadCount > 0
        ? `${unreadCount} non lue${unreadCount > 1 ? 's' : ''}`
        : 'Tout est lu';

      if (unreadCount > 0) btnAll.style.display = 'block';

      /* Grouper par date */
      const groups = {};
      notifs.forEach(n => {
        const d    = new Date(n.created_at);
        const now  = new Date();
        const diff = Math.floor((now - d) / 86400000);
        let label  = diff === 0 ? "Aujourd'hui"
                   : diff === 1 ? 'Hier'
                   : diff < 7  ? `Il y a ${diff} jours`
                   : d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long' });
        if (!groups[label]) groups[label] = [];
        groups[label].push(n);
      });

      let html = '';
      let delay = 0;
      Object.entries(groups).forEach(([label, items]) => {
        html += `<div class="notif-group"><span class="notif-group-label">${label}</span>`;
        items.forEach(n => {
          const cfg  = ICONS[n.type] || ICONS.admin;
          const time = new Date(n.created_at).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
          html += `
            <div class="notif-item ${n.lu ? '' : 'unread'}"
                 style="animation-delay:${delay}ms"
                 id="notif-${n.id}"
                 onclick="markRead(${n.id})">
              <div class="notif-icon ${cfg.cls}">
                <i class="bi ${cfg.icon}"></i>
              </div>
              <div class="notif-content">
                <div class="notif-title">${n.titre}</div>
                <div class="notif-message">${n.message}</div>
                <div class="notif-time"><i class="bi bi-clock"></i>${time}</div>
              </div>
              <div class="notif-unread-dot"></div>
            </div>`;
          delay += 50;
        });
        html += '</div>';
      });

      container.innerHTML = html;
    }

    /* ── Marquer une notif comme lue ── */
    async function markRead(id) {
      const item = document.getElementById('notif-' + id);
      if (!item || !item.classList.contains('unread')) return;

      item.classList.remove('unread');
      item.querySelector('.notif-unread-dot').style.opacity = '0';

      try {
        await fetch(`${API}/notifications/${id}/lu`, {
          method: 'PATCH', headers: hdrs
        });
        updateUnreadCount();
      } catch {}
    }

    /* ── Tout marquer comme lu ── */
    async function markAllRead() {
      document.querySelectorAll('.notif-item.unread').forEach(el => {
        el.classList.remove('unread');
        const dot = el.querySelector('.notif-unread-dot');
        if (dot) dot.style.opacity = '0';
      });
      document.getElementById('btnReadAll').style.display = 'none';
      document.getElementById('pageSub').textContent = 'Tout est lu';

      try {
        await fetch(`${API}/notifications/lu-tout`, {
          method: 'PATCH', headers: hdrs
        });
      } catch {}
    }

    /* ── Mise à jour compteur ── */
    function updateUnreadCount() {
      const remaining = document.querySelectorAll('.notif-item.unread').length;
      const pageSub   = document.getElementById('pageSub');
      const btnAll    = document.getElementById('btnReadAll');
      if (remaining === 0) {
        pageSub.textContent = 'Tout est lu';
        btnAll.style.display = 'none';
      } else {
        pageSub.textContent = `${remaining} non lue${remaining > 1 ? 's' : ''}`;
      }
    }

    /* ── Déconnexion ── */
    async function logout() {
      try { await fetch(`${API}/auth/logout`, { method: 'POST', headers: hdrs }); } catch {}
      sessionStorage.clear();
      location.href = 'login.html';
    }

    loadNotifs();
  </script>

</body>
</html>
