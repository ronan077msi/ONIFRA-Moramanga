<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ONIFRA – Hero</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" media="print" onload="this.media='all'">
<link rel="preload" as="image" href="../assets/img/campus.jpg" fetchpriority="high">

<style>
:root {
  --accent: #c8972a;
  --accent-light: #f0c050;
}

/* ── HERO ── */
.hero {
  position: relative;
  min-height: 88vh;
  display: flex;
  align-items: center;
  overflow: hidden;
}

/* Overlay dégradé riche */
.hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to top, rgba(8,18,45,0.90) 0%, rgba(8,18,45,0.40) 60%, transparent 100%),
    linear-gradient(rgba(8,18,45,0.45), rgba(8,18,45,0.45));
  z-index: 1;
}

/* Image fond avec zoom lent */
.hero-bg {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center;
  transform: scale(1.07);
  animation: bgZoom 20s ease-out forwards;
  z-index: 0;
}
@keyframes bgZoom {
  to { transform: scale(1.0); }
}

.hero-inner {
  position: relative;
  z-index: 2;
  width: 100%;
  padding: 80px 0 70px;
}

/* Badge animé */
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(200,151,42,0.15);
  border: 1px solid rgba(200,151,42,0.5);
  color: var(--accent-light);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  border-radius: 50px;
  padding: 5px 18px;
  opacity: 0;
  animation: fadeUp 0.6s ease 0.2s forwards;
}
.hero-badge .dot {
  width: 6px; height: 6px;
  background: var(--accent-light);
  border-radius: 50%;
  animation: blink 2s ease-in-out 1.2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* Titre */
.hero-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 5.5vw, 3.8rem);
  font-weight: 700;
  line-height: 1.15;
  color: #fff;
  opacity: 0;
  animation: fadeUp 0.7s ease 0.45s forwards;
}
.hero-title .gold {
  color: var(--accent-light);
  position: relative;
  display: inline-block;
}
.hero-title .gold::after {
  content: '';
  position: absolute;
  bottom: -3px; left: 0; right: 0;
  height: 2px;
  background: var(--accent);
  transform: scaleX(0);
  transform-origin: left;
  animation: lineGrow 0.5s ease 1.2s forwards;
}
@keyframes lineGrow { to { transform: scaleX(1); } }

/* Divider doré */
.hero-divider {
  width: 56px; height: 2px;
  background: linear-gradient(to right, var(--accent), transparent);
  margin: 0 auto;
  border-radius: 2px;
  opacity: 0;
  animation: fadeUp 0.5s ease 0.65s forwards;
}

/* Sous-titre */
.hero-sub {
  font-family: 'DM Sans', sans-serif;
  font-size: clamp(1rem, 2.2vw, 1.2rem);
  color: rgba(255,255,255,0.82);
  line-height: 1.7;
  opacity: 0;
  animation: fadeUp 0.7s ease 0.8s forwards;
}

/* Boutons */
.hero-btns {
  opacity: 0;
  animation: fadeUp 0.7s ease 1s forwards;
}
.btn-hero-gold {
  background: var(--accent);
  color: #fff;
  border: 2px solid var(--accent);
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: 0.95rem;
  padding: 13px 36px;
  text-decoration: none;
  display: inline-flex; align-items: center; gap: 8px;
  transition: all .25s;
}
.btn-hero-gold:hover {
  background: #b07820;
  border-color: #b07820;
  color: #fff;
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(200,151,42,0.45);
}
.btn-hero-ghost {
  background: transparent;
  color: #fff;
  border: 2px solid rgba(255,255,255,0.45);
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: 0.95rem;
  padding: 13px 36px;
  text-decoration: none;
  display: inline-flex; align-items: center; gap: 8px;
  transition: all .25s;
}
.btn-hero-ghost:hover {
  border-color: #fff;
  background: rgba(255,255,255,0.1);
  color: #fff;
  transform: translateY(-2px);
}

/* Tags disciplines */
.hero-tags {
  opacity: 0;
  animation: fadeUp 0.6s ease 1.2s forwards;
}
.hero-tag {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  color: rgba(255,255,255,0.6);
  letter-spacing: 0.06em;
  transition: color .2s;
}
.hero-tag:hover { color: var(--accent-light); }
.hero-tag-sep {
  color: var(--accent);
  opacity: 0.6;
  margin: 0 2px;
}

/* Scroll hint */
.scroll-hint {
  position: absolute;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 3;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  opacity: 0;
  animation: fadeIn 0.6s ease 2s forwards;
}
.scroll-hint span {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.68rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
}
.scroll-mouse {
  width: 20px; height: 32px;
  border: 1.5px solid rgba(255,255,255,0.3);
  border-radius: 10px;
  position: relative;
}
.scroll-mouse::after {
  content: '';
  position: absolute;
  width: 3px; height: 6px;
  background: rgba(255,255,255,0.5);
  border-radius: 2px;
  left: 50%; top: 5px;
  transform: translateX(-50%);
  animation: scrollDot 1.8s ease-in-out infinite;
}
@keyframes scrollDot {
  0%   { top: 5px; opacity: 1; }
  75%  { top: 15px; opacity: 0; }
  100% { top: 5px; opacity: 0; }
}

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  to { opacity: 1; }
}

/* ── RESPONSIVE ── */
@media (max-width: 767.98px) {
  .hero { min-height: 92vh; }
  .hero-inner { padding: 70px 0 60px; }
  .hero-btns { flex-direction: column; align-items: stretch; }
  .btn-hero-gold, .btn-hero-ghost {
    justify-content: center;
    padding: 12px 24px;
  }
}
@media (max-width: 575.98px) {
  .hero-title { font-size: 1.9rem; }
  .hero-sub { font-size: 1rem; }
}
</style>
</head>
<body style="margin:0;">

<header class="hero">

  <!-- Image fond — LCP optimisée -->
  <img
    class="hero-bg"
    src="../assets/img/campus.jpg"
    alt="Campus ONIFRA Moramanga"
    width="1920" height="1080"
    fetchpriority="high"
    loading="eager"
    decoding="async"
  >

  <div class="hero-inner">
    <div class="container text-center">

      <!-- Titre -->
      <h1 class="hero-title mb-4">
        Bienvenue à l'<span class="gold">ONIFRA</span> Moramanga
      </h1>

      <!-- Divider -->
      <div class="hero-divider mb-4"></div>

      <!-- Sous-titre -->
      <p class="hero-sub mb-5">
        Oniversity FJKM Ravelojaona<br>
        Formation d'excellence &nbsp;•&nbsp; Valeurs chrétiennes &nbsp;•&nbsp; <em>EN CHRIST</em>
      </p>

      <!-- Boutons -->
      <div class="hero-btns d-flex justify-content-center gap-3 flex-wrap mb-5">
        <a href="#" class="btn-hero-gold">
          <i class="bi bi-pencil-square"></i>
          S'inscrire maintenant
        </a>
        <a href="#" class="btn-hero-ghost">
          <i class="bi bi-mortarboard"></i>
          Découvrir nos formations
        </a>
      </div>

      <!-- Tags -->
      <div class="hero-tags d-flex justify-content-center align-items-center gap-3 flex-wrap">
        <span class="hero-tag"><i class="bi bi-tree me-1"></i>Agronomie</span>
        <span class="hero-tag-sep">✦</span>
        <span class="hero-tag"><i class="bi bi-graph-up me-1"></i>Gestion</span>
        <span class="hero-tag-sep">✦</span>
        <span class="hero-tag"><i class="bi bi-bank me-1"></i>Droit</span>
      </div>

    </div>
  </div>

  <!-- Scroll hint -->
  <div class="scroll-hint">
    <div class="scroll-mouse"></div>
    <span>Défiler</span>
  </div>
</header>

<!-- Demo spacer -->
<div style="height:50vh; background:#0d1b33;"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
