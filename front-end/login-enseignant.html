<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portail Enseignant — ONIFRA</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    :root {
      --navy:       #08122d;
      --navy-mid:   #0d1f3c;
      --accent:     #c8a951;
      --accent-lt:  #e4c96a;
      --muted:      rgba(255,255,255,0.45);
      --error:      #e05c5c;
      --green:      #22c55e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0a1628;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    /* ── Fond ── */
    .bg-grid {
      position: fixed; inset: 0;
      background-image: radial-gradient(rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none; z-index: 0;
    }
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(90px); pointer-events: none; z-index: 0;
      will-change: transform;
    }
    .orb-1 { width:450px; height:450px; background:#0a2a14; opacity:.5; top:-120px; right:-100px; animation: drift 16s ease-in-out infinite; }
    .orb-2 { width:300px; height:300px; background:#1a3a6b; opacity:.3; bottom:-60px; left:-60px; animation: drift 20s ease-in-out infinite reverse; }
    @keyframes drift { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,-25px)} }

    /* ── Card ── */
    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px; margin: 1.5rem;
      background: rgba(13,31,60,0.88);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(34,197,94,.2);
      border-radius: 20px; padding: 2.5rem 2rem;
      animation: slideUp .6s cubic-bezier(.22,.68,0,1.2) both;
    }
    @keyframes slideUp { from{opacity:0;transform:translateY(32px)} to{opacity:1;transform:translateY(0)} }

    /* ── Header ── */
    .card-header { text-align: center; margin-bottom: 2rem; }
    .logo-wrap {
      display: inline-flex; align-items: center; justify-content: center;
      width: 64px; height: 64px;
      background: rgba(34,197,94,.1);
      border: 1px solid rgba(34,197,94,.25);
      border-radius: 16px; margin-bottom: 1.25rem;
    }
    .logo-wrap img { width: 44px; height: auto; }

    .card-eyebrow {
      font-size: .7rem; font-weight: 600; letter-spacing: .2em;
      text-transform: uppercase; color: var(--green);
      margin-bottom: .4rem; display: block;
    }
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem; font-weight: 700; color: #fff; line-height: 1.2;
    }
    .card-title em { color: var(--green); font-style: italic; }
    .card-sub { font-size: .82rem; color: var(--muted); margin-top: .5rem; line-height: 1.5; }

    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(34,197,94,.25), transparent);
      margin: 1.5rem 0;
    }

    /* ── PIN dots ── */
    .pin-label {
      display: block; font-size: .75rem; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted); margin-bottom: .75rem; text-align: center;
    }
    .pin-display {
      display: flex; gap: .5rem;
      justify-content: center; margin-bottom: 1.25rem;
    }
    .pin-dot {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid rgba(34,197,94,.35);
      background: transparent; will-change: transform;
      transition: background .12s, border-color .12s, transform .12s;
    }
    .pin-dot.filled {
      background: var(--green);
      border-color: var(--green);
      transform: scale(1.15);
    }

    /* ── Clavier PIN ── */
    .pin-grid {
      display: grid; grid-template-columns: repeat(3,1fr); gap: .5rem;
      margin-bottom: 1.25rem;
    }
    .pin-btn {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px; color: #fff;
      font-family: 'DM Sans', sans-serif; font-size: 1.1rem; font-weight: 500;
      padding: .9rem; cursor: pointer;
      touch-action: manipulation; will-change: transform;
      user-select: none; -webkit-tap-highlight-color: transparent;
      transition: background .1s, border-color .1s;
    }
    .pin-btn:hover  { background: rgba(255,255,255,.12); }
    .pin-btn:active { background: rgba(34,197,94,.18); border-color: rgba(34,197,94,.5); }
    .pin-btn.del    { color: var(--green); font-size: 1.2rem; }

    /* ── Submit ── */
    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, #16a34a, var(--green));
      border: none; border-radius: 12px;
      color: #fff; font-family: 'DM Sans', sans-serif;
      font-size: .95rem; font-weight: 700;
      padding: .9rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
      transition: opacity .2s, transform .2s, box-shadow .2s;
      box-shadow: 0 4px 20px rgba(34,197,94,.25);
    }
    .btn-submit:hover   { opacity:.92; transform:translateY(-2px); box-shadow:0 8px 28px rgba(34,197,94,.35); }
    .btn-submit:active  { transform:scale(.98); }
    .btn-submit:disabled { opacity:.4; cursor:not-allowed; transform:none; box-shadow:none; }
    .spinner {
      width:18px; height:18px;
      border:2px solid rgba(255,255,255,.3);
      border-top-color:#fff;
      border-radius:50%; animation:spin .7s linear infinite; display:none;
    }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* ── Erreur ── */
    .error-msg {
      display:none; align-items:center; gap:8px;
      background:rgba(224,92,92,.12); border:1px solid rgba(224,92,92,.3);
      border-radius:8px; padding:.65rem 1rem;
      color:var(--error); font-size:.82rem; margin-bottom:1rem;
    }
    .error-msg.show { display:flex; animation:shake .35s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

    /* ── Lien étudiant ── */
    .switch-link {
      text-align: center; margin-top: 1.25rem;
      font-size: .75rem; color: var(--muted);
    }
    .switch-link a {
      color: var(--accent); text-decoration: none; font-weight: 500;
    }
    .switch-link a:hover { text-decoration: underline; }

    /* ── Verset ── */
    .verset {
      text-align: center; margin-top: 1.75rem;
      padding-top: 1.25rem; border-top: 1px solid rgba(255,255,255,.06);
    }
    .verset p {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: .78rem; color: rgba(255,255,255,.3); line-height: 1.6;
    }
    .verset span {
      font-size: .65rem; font-weight: 600; letter-spacing: .15em;
      text-transform: uppercase; color: rgba(34,197,94,.4);
      display: block; margin-top: .3rem;
    }

    @media(max-width:400px) { .card{padding:2rem 1.25rem} .card-title{font-size:1.4rem} }
  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="card">

    <div class="card-header">
      <div class="logo-wrap">
        <img src="assets/img/logo/logo.webp" alt="ONIFRA" onerror="this.style.display='none'">
      </div>
      <span class="card-eyebrow">Espace Enseignant</span>
      <h1 class="card-title">Portail <em>Enseignant</em></h1>
      <p class="card-sub">Accédez à vos modules et gérez vos supports de cours.</p>
    </div>

    <div class="divider"></div>

    <form id="loginForm" autocomplete="off">

      <label class="pin-label">Entrez votre code PIN</label>

      <!-- PIN dots -->
      <div class="pin-display">
        <div class="pin-dot" id="d0"></div>
        <div class="pin-dot" id="d1"></div>
        <div class="pin-dot" id="d2"></div>
        <div class="pin-dot" id="d3"></div>
        <div class="pin-dot" id="d4"></div>
        <div class="pin-dot" id="d5"></div>
      </div>

      <!-- Clavier -->
      <div class="pin-grid" id="pinGrid">
        <button type="button" class="pin-btn" data-v="1">1</button>
        <button type="button" class="pin-btn" data-v="2">2</button>
        <button type="button" class="pin-btn" data-v="3">3</button>
        <button type="button" class="pin-btn" data-v="4">4</button>
        <button type="button" class="pin-btn" data-v="5">5</button>
        <button type="button" class="pin-btn" data-v="6">6</button>
        <button type="button" class="pin-btn" data-v="7">7</button>
        <button type="button" class="pin-btn" data-v="8">8</button>
        <button type="button" class="pin-btn" data-v="9">9</button>
        <button type="button" class="pin-btn" data-v="0" style="grid-column:2">0</button>
        <button type="button" class="pin-btn del" id="pinDel">
          <i class="bi bi-backspace"></i>
        </button>
      </div>
      <input type="hidden" id="pin">

      <!-- Erreur -->
      <div class="error-msg" id="errorMsg">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span id="errorText">Code PIN incorrect.</span>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn-submit" id="btnSubmit" disabled>
        <div class="spinner" id="spinner"></div>
        <i class="bi bi-box-arrow-in-right" id="btnIcon"></i>
        <span id="btnText">Se connecter</span>
      </button>

    </form>

    <div class="switch-link">
      Vous êtes étudiant ?
      <a href="login.html">Portail étudiant →</a>
    </div>

    <div class="verset">
      <p>« Dieu fera de vous la tête et non la queue »</p>
      <span>Deutéronome 28 : 13a</span>
    </div>

  </div>

  <script>
    /* ── Auth guard ── */
    (function () {
      const t = sessionStorage.getItem('onifra_ens_token');
      if (!t) return;
      try {
        const p = JSON.parse(atob(t.split('.')[1]));
        if (p.exp * 1000 > Date.now()) location.href = 'mes-modules.html';
      } catch { sessionStorage.removeItem('onifra_ens_token'); }
    })();

    /* ── State ── */
    const API  = '/api';
    const PIN_LENGTH = 6; /* PIN enseignant = 6 chiffres */
    let   pin  = '';
    const dots = [0,1,2,3,4,5].map(i => document.getElementById('d' + i));
    const btn     = document.getElementById('btnSubmit');
    const spinner = document.getElementById('spinner');
    const btnIcon = document.getElementById('btnIcon');
    const btnText = document.getElementById('btnText');
    const errMsg  = document.getElementById('errorMsg');
    const errTxt  = document.getElementById('errorText');

    /* ── Sync dots ── */
    function syncDots() {
      dots.forEach((d, i) => {
        const f = i < pin.length;
        if (f !== d.classList.contains('filled')) d.classList.toggle('filled', f);
      });
      document.getElementById('pin').value = pin;
      btn.disabled = pin.length < PIN_LENGTH;
    }

    /* ── Clavier PIN — délégation ── */
    document.getElementById('pinGrid').addEventListener('pointerdown', e => {
      const b = e.target.closest('.pin-btn');
      if (!b) return;
      if (b.id === 'pinDel') {
        pin = pin.slice(0, -1);
      } else if (b.dataset.v !== undefined && pin.length < PIN_LENGTH) {
        pin += b.dataset.v;
      }
      requestAnimationFrame(() => {
        syncDots();
        if (pin.length === PIN_LENGTH) {
          setTimeout(() => document.getElementById('loginForm').requestSubmit(), 150);
        }
      });
    }, { passive: true });

    /* ── Clavier physique ── */
    document.addEventListener('keydown', e => {
      if (/^[0-9]$/.test(e.key) && pin.length < PIN_LENGTH) { pin += e.key; requestAnimationFrame(syncDots); }
      if (e.key === 'Backspace') { pin = pin.slice(0, -1); requestAnimationFrame(syncDots); }
    });

    /* ── Soumission ── */
    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      errMsg.classList.remove('show');
      setLoading(true);
      try {
        const res  = await fetch(`${API}/auth/enseignant/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pin })
        });
        const data = await res.json();

        if (!res.ok) {
          showError(data.message || 'Code PIN incorrect.');
          pin = ''; requestAnimationFrame(syncDots);
          return;
        }

        /* Stocker session enseignant */
        sessionStorage.setItem('onifra_ens_token', data.token);
        sessionStorage.setItem('onifra_enseignant', JSON.stringify({
          id:     data.id,
          nom:    data.nom,
          prenom: data.prenom,
          grade:  data.grade || ''
        }));
        location.href = 'mes-modules.html';

      } catch {
        showError('Erreur réseau. Vérifiez votre connexion.');
      } finally {
        setLoading(false);
      }
    });

    function setLoading(on) {
      btn.disabled          = on;
      spinner.style.display = on ? 'block' : 'none';
      btnIcon.style.display = on ? 'none'  : 'inline';
      btnText.textContent   = on ? 'Connexion…' : 'Se connecter';
    }

    function showError(msg) {
      errTxt.textContent = msg;
      errMsg.classList.remove('show');
      void errMsg.offsetWidth;
      errMsg.classList.add('show');
    }
  </script>

</body>
</html>
